<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="/css/style.css">
        <title>Search</title>
    </head>
    <body>
        <nav class ="header">
            <div class="header-left">
                <a href="https://about.google/" class="header_style header_style--1">About</a>
                <a href="https://store.google.com/regionpicker" class="header_style header_style--2">Store</a>
            </div>
            <div class="header-right">
                <a href="google.com/gmail" class="header_style header_style--3">Gmail</a>
                <a href="imagesindex.html" class="header_style">Google Image</a>
                <a href="advancedsearch.html" class="header_style">Advanced Search</a>
                <button class="btn-blue">Log in</button>
            </div>
        </nav>
        <div class="container">
                <img src="/Google_2015_logo.svg.png" alt="Google Logo" class="logo">
                <form action="https://google.com/search" class="search">
                    <input type="text" class="search_input" placeholder="" name="q">
                    <div class="search_button">
                        <svg class="search_icon">
                            <use xlink:href="/sprite.svg#icon-magnifying-glass"></use>
                        </svg>
                    </div>
                    <div class="search-button">
                        <input type="submit" class="button button-1" value="Google Search">
                        <input type="submit" class="button" value="I'm Feeling Lucky">
                    </div>
                </form>
        </div>
    </body>
</html>
