<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="/css/imagestyle.css">
    </head>
    <body>
        <nav class ="header">          
            <div class="header-right">
                <a href="index.html" class="header_style">Google's Page</a>
            </div>
        </nav>
        <div class="container">
                <img src="/Google_2015_logo.svg.png" alt="Google Logo" class="logo">
                <form action="https://google.com/images" class="search">
                    <input type="text" class="search_input" placeholder="" name="q">
                    <div class="search_button">
                        <svg class="search_icon">
                            <use xlink:href="/sprite.svg#icon-magnifying-glass"></use>
                        </svg>
                    </div>
                    <div class="search-button">
                        <input type="submit" class="button button-1" value="Search Images">
                    </div>
                </form>
        </div>
    </body>
</html>
